name: Build Packages

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            appimage: true
          - arch: arm64
            runner: ubuntu-24.04-arm
            appimage: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libqt5charts5-dev \
            qtbase5-dev \
            qtbase5-dev-tools
          if [ "${{ matrix.appimage }}" = "true" ]; then
            sudo apt-get install -y desktop-file-utils file libfuse2 patchelf wget
          fi

      - name: Build Capstone
        run: make -C capstone -j"$(nproc)"

      - name: Build HexWalk
        run: ./linux_build.sh

      - name: Package Linux archive
        run: |
          set -eux
          package="HexWalk-linux-${{ matrix.arch }}"
          mkdir -p "dist/$package"
          cp bin/hexwalk "dist/$package/"
          cp LICENSE README.md "dist/$package/"
          tar -C dist -czf "dist/${package}.tar.gz" "$package"

      - name: Package AppImage
        if: matrix.appimage
        run: |
          set -eux
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp bin/hexwalk AppDir/usr/bin/hexwalk
          cp hexwalk/images/hexwalk256.png AppDir/usr/share/icons/hicolor/256x256/apps/hexwalk.png
          cat > AppDir/usr/share/applications/hexwalk.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=HexWalk
          Comment=Hex editor, viewer, and binary analyzer
          Exec=hexwalk
          Icon=hexwalk
          Categories=Development;Utility;
          Terminal=false
          EOF
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt
          ./linuxdeployqt AppDir/usr/share/applications/hexwalk.desktop -unsupported-allow-new-glibc -appimage
          mkdir -p dist
          mv HexWalk*.AppImage "dist/HexWalk-linux-x86_64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HexWalk-linux-${{ matrix.arch }}
          path: |
            dist/HexWalk-linux-${{ matrix.arch }}.tar.gz
            dist/HexWalk-linux-x86_64.AppImage
          if-no-files-found: ignore

  windows:
    name: Windows Win7 x86
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 5.15.2 MinGW 32-bit
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win32_mingw81 -O C:\Qt
          python -m aqt install-tool windows desktop tools_mingw qt.tools.win32_mingw810 -O C:\Qt

      - name: Build Capstone
        shell: pwsh
        run: |
          $env:Path = "C:\Qt\Tools\mingw810_32\bin;C:\Qt\5.15.2\mingw81_32\bin;$env:Path"
          cmake -S capstone -B capstone/build -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DCAPSTONE_BUILD_STATIC_RUNTIME=ON `
            -DCAPSTONE_BUILD_TESTS=OFF `
            -DCAPSTONE_BUILD_CSTOOL=OFF `
            -DCAPSTONE_BUILD_CSTEST=OFF
          cmake --build capstone/build --parallel $env:NUMBER_OF_PROCESSORS
          if (!(Test-Path capstone/build/libcapstone.a)) {
            Get-ChildItem capstone/build -Recurse -Filter "*capstone*.a" | Format-Table FullName
            throw "capstone/build/libcapstone.a was not produced"
          }

      - name: Build HexWalk
        shell: pwsh
        run: |
          $env:Path = "C:\Qt\Tools\mingw810_32\bin;C:\Qt\5.15.2\mingw81_32\bin;$env:Path"
          if (Test-Path build) { Remove-Item build\* -Recurse -Force }
          else { New-Item -ItemType Directory build | Out-Null }
          Push-Location build
          qmake ..\hexwalk\hexwalk.pro `
            "QMAKE_CFLAGS+=-D_WIN32_WINNT=0x0601 -DNTDDI_VERSION=0x06010000" `
            "QMAKE_CXXFLAGS+=-D_WIN32_WINNT=0x0601 -DNTDDI_VERSION=0x06010000" `
            "QMAKE_LFLAGS+=-Wl,--major-subsystem-version,6,--minor-subsystem-version,1"
          mingw32-make -j$env:NUMBER_OF_PROCESSORS
          Pop-Location

      - name: Package Windows zip
        shell: pwsh
        run: |
          $env:Path = "C:\Qt\Tools\mingw810_32\bin;C:\Qt\5.15.2\mingw81_32\bin;$env:Path"
          $package = "HexWalk-windows-win7-x86"
          New-Item -ItemType Directory -Force "dist\$package" | Out-Null
          Copy-Item bin\hexwalk.exe "dist\$package\"
          windeployqt --release --compiler-runtime "dist\$package\hexwalk.exe"
          Copy-Item LICENSE, README.md "dist\$package\"
          Compress-Archive -Path "dist\$package\*" -DestinationPath "dist\$package.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexWalk-windows-win7-x86
          path: dist/HexWalk-windows-win7-x86.zip
