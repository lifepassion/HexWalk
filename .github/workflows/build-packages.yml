name: Build Packages

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:20.04
      env:
        DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            appimage_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            appimage_arch: aarch64

    steps:
      - name: Install build environment
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            desktop-file-utils \
            file \
            git \
            libgl1-mesa-dev \
            libqt5charts5-dev \
            patchelf \
            qtbase5-dev \
            qtbase5-dev-tools \
            wget

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Capstone
        run: make -C capstone -j"$(nproc)"

      - name: Build HexWalk
        run: ./linux_build.sh

      - name: Prepare AppDir
        run: |
          set -eux
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/plugins/platforms
          mkdir -p AppDir/usr/plugins/imageformats
          cp bin/hexwalk AppDir/usr/bin/hexwalk
          cp hexwalk/images/hexwalk256.png AppDir/usr/share/icons/hicolor/256x256/apps/hexwalk.png
          cp hexwalk/images/hexwalk256.png AppDir/hexwalk.png
          cat > AppDir/usr/share/applications/hexwalk.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=HexWalk
          Comment=Hex editor, viewer, and binary analyzer
          Exec=hexwalk
          Icon=hexwalk
          Categories=Development;Utility;
          Terminal=false
          EOF
          cp AppDir/usr/share/applications/hexwalk.desktop AppDir/hexwalk.desktop
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$HERE/usr/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/usr/plugins/platforms"
          exec "$HERE/usr/bin/hexwalk" "$@"
          EOF
          chmod +x AppDir/AppRun

          qt_plugins="$(qmake -query QT_INSTALL_PLUGINS)"
          cp "$qt_plugins/platforms/libqxcb.so" AppDir/usr/plugins/platforms/
          cp "$qt_plugins/imageformats"/libq*.so AppDir/usr/plugins/imageformats/

          copy_deps() {
            local binary="$1"
            ldd "$binary" \
              | awk '/=> \// { print $3 } /^\// { print $1 }' \
              | while read -r lib; do
                  case "$lib" in
                    *linux-vdso*|*/ld-linux-*.so.*|*/libc.so.*|*/libpthread.so.*|*/libdl.so.*|*/libm.so.*|*/librt.so.*|*/libresolv.so.*)
                      continue
                      ;;
                  esac
                  cp -n "$lib" AppDir/usr/lib/ || true
                done
          }

          copy_deps AppDir/usr/bin/hexwalk
          find AppDir/usr/plugins -type f -name '*.so' -print0 | while IFS= read -r -d '' plugin; do
            copy_deps "$plugin"
          done
          for pass in 1 2 3; do
            find AppDir/usr/lib -type f -name '*.so*' -print0 | while IFS= read -r -d '' lib; do
              copy_deps "$lib"
            done
          done
          cp LICENSE README.md AppDir/

      - name: Verify GLIBC compatibility
        shell: bash
        run: |
          set -uo pipefail
          failed=0
          maximum=0

          while IFS= read -r -d '' binary; do
            if ! file "$binary" | grep -q 'ELF'; then
              continue
            fi

            while IFS= read -r version; do
              if dpkg --compare-versions "$version" gt "$maximum"; then
                maximum="$version"
              fi
              if dpkg --compare-versions "$version" gt '2.31'; then
                echo "::error file=$binary::Requires GLIBC_$version, newer than the supported GLIBC_2.31 baseline"
                failed=1
              fi
            done < <(
              readelf --version-info "$binary" 2>/dev/null \
                | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)*' \
                | cut -d_ -f2 \
                | sort -Vu \
                || true
            )
          done < <(find AppDir -type f -print0)

          echo "Maximum required GLIBC version: $maximum"
          exit "$failed"

      - name: Package AppImage
        run: |
          set -eux
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage -O appimagetool
          chmod +x appimagetool
          mkdir -p dist
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=${{ matrix.appimage_arch }} ./appimagetool AppDir "dist/HexWalk-linux-${{ matrix.arch }}.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HexWalk-linux-${{ matrix.arch }}
          path: dist/HexWalk-linux-${{ matrix.arch }}.AppImage
          if-no-files-found: error

  windows:
    name: Windows Win7 x86
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 5.15.2 MinGW 32-bit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win32_mingw81 -m qtcharts -O C:\Qt
          python -m aqt install-tool windows desktop tools_mingw qt.tools.win32_mingw810 -O C:\Qt

      - name: Build Capstone
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $jobs = [Environment]::ProcessorCount
          $env:Path = "C:\Qt\Tools\mingw810_32\bin;C:\Qt\5.15.2\mingw81_32\bin;$env:Path"
          cmake -S capstone -B capstone/build -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DCAPSTONE_BUILD_STATIC_RUNTIME=ON `
            -DCAPSTONE_BUILD_TESTS=OFF `
            -DCAPSTONE_BUILD_CSTOOL=OFF `
            -DCAPSTONE_BUILD_CSTEST=OFF
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build capstone/build --parallel $jobs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (!(Test-Path capstone/build/libcapstone.a)) {
            Get-ChildItem capstone/build -Recurse -Filter "*capstone*.a" | Format-Table FullName
            throw "capstone/build/libcapstone.a was not produced"
          }

      - name: Build HexWalk
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $jobs = [Environment]::ProcessorCount
          $env:Path = "C:\Qt\Tools\mingw810_32\bin;C:\Qt\5.15.2\mingw81_32\bin;$env:Path"
          if (Test-Path build) { Remove-Item build\* -Recurse -Force }
          else { New-Item -ItemType Directory build | Out-Null }
          Push-Location build
          qmake ..\hexwalk\hexwalk.pro `
            "QMAKE_CFLAGS+=-D_WIN32_WINNT=0x0601 -DNTDDI_VERSION=0x06010000" `
            "QMAKE_CXXFLAGS+=-D_WIN32_WINNT=0x0601 -DNTDDI_VERSION=0x06010000" `
            "QMAKE_LFLAGS+=-Wl,--major-subsystem-version,6,--minor-subsystem-version,1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mingw32-make "-j$jobs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location

      - name: Package Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $qtRoot = "C:\Qt\5.15.2\mingw81_32"
          $mingwRoot = "C:\Qt\Tools\mingw810_32"
          $qtBin = Join-Path $qtRoot "bin"
          $qtPlugins = Join-Path $qtRoot "plugins"
          $mingwBin = Join-Path $mingwRoot "bin"
          $env:Path = "$mingwBin;$qtBin;$env:Path"
          $package = "HexWalk-windows-win7-x86"
          $packageDir = "dist\$package"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item bin\hexwalk.exe $packageDir

          Copy-Item (Join-Path $qtBin "Qt5*.dll") $packageDir
          foreach ($dll in @("libgcc_s_dw2-1.dll", "libgcc_s_sjlj-1.dll", "libgcc_s_seh-1.dll", "libstdc++-6.dll", "libwinpthread-1.dll", "libssp-0.dll")) {
            $path = Join-Path $mingwBin $dll
            if (Test-Path $path) {
              Copy-Item $path $packageDir
            }
          }
          foreach ($dll in @("libEGL.dll", "libGLESv2.dll", "D3Dcompiler_47.dll", "opengl32sw.dll")) {
            $path = Join-Path $qtBin $dll
            if (Test-Path $path) {
              Copy-Item $path $packageDir
            }
          }

          New-Item -ItemType Directory -Force "$packageDir\plugins\platforms" | Out-Null
          New-Item -ItemType Directory -Force "$packageDir\plugins\imageformats" | Out-Null
          New-Item -ItemType Directory -Force "$packageDir\plugins\styles" | Out-Null
          $qwindows = Join-Path $qtPlugins "platforms\qwindows.dll"
          if (!(Test-Path $qwindows)) {
            Get-ChildItem $qtPlugins -Recurse | Select-Object FullName
            throw "Qt platform plugin qwindows.dll was not found"
          }
          Copy-Item $qwindows "$packageDir\plugins\platforms\"
          Copy-Item (Join-Path $qtPlugins "imageformats\*.dll") "$packageDir\plugins\imageformats\"
          $vistaStyle = Join-Path $qtPlugins "styles\qwindowsvistastyle.dll"
          if (Test-Path $vistaStyle) {
            Copy-Item $vistaStyle "$packageDir\plugins\styles\"
          }

          Set-Content -Encoding ASCII "$packageDir\qt.conf" "[Paths]`r`nPlugins = plugins`r`n"

          Copy-Item LICENSE, README.md $packageDir
          Compress-Archive -Path "$packageDir\*" -DestinationPath "$packageDir.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexWalk-windows-win7-x86
          path: dist/HexWalk-windows-win7-x86.zip
